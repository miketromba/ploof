name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: bun install
        working-directory: .
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
      - run: npm pack --dry-run
      - id: package
        run: |
          node -e "const pkg = require('./package.json'); console.log('name=' + pkg.name); console.log('version=' + pkg.version)" >> "$GITHUB_OUTPUT"
      - id: published
        run: |
          if npm dist-tag ls "${{ steps.package.outputs.name }}" 2>/dev/null | grep -q "^latest: ${{ steps.package.outputs.version }}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.published.outputs.exists != 'true'
        run: npm publish --access public --provenance
      - if: steps.published.outputs.exists == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping npm publish."
